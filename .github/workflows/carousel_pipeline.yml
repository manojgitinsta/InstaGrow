name: Afternoon Carousel Pipeline

on:
  # ⏸️ PAUSED — Daily posting disabled. Uncomment schedule to resume.
  # schedule:
  #   # 4:00 PM IST is 10:30 AM UTC
  #   - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-carousel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick fonts-liberation

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Post Afternoon Carousel
        env:
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_daily.py --now --carousel
